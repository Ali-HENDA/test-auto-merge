name: Notify Chat on PR Events

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.CHAT_WEBHOOK_URL }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          REVIEW_STATE="${{ github.event.review.state }}"
          REVIEWER="${{ github.event.review.user.login }}"
          MESSAGE=""

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            if [ "${{ github.event.issue.pull_request }}" = "" ]; then
              echo "Not a PR comment, skipping"
              exit 0
            fi
            PR_TITLE="${{ github.event.issue.title }}"
            PR_URL="${{ github.event.issue.html_url }}"
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
          fi

          PR_LINK="[${PR_TITLE}](${PR_URL})"

          case "$EVENT_NAME" in
            pull_request)
              MESSAGE="Nouvelle PR ouverte par ${ACTOR} : ${PR_LINK}"
              ;;

            pull_request_review)
              case "$REVIEW_STATE" in
                approved)
                  MESSAGE="✅ ${REVIEWER} a approuvé la PR : ${PR_LINK}"
                  ;;
                changes_requested)
                  MESSAGE="⚠️ ${REVIEWER} a demandé des changements sur : ${PR_LINK}"
                  ;;
                *)
                  MESSAGE="💬 ${REVIEWER} a commenté la PR : ${PR_LINK}"
                  ;;
              esac
              ;;

            issue_comment)
              MESSAGE="💬 ${ACTOR} a commenté la PR : ${PR_LINK}"
              ;;
          esac

          if [ -z "$WEBHOOK_URL" ]; then
            echo "WEBHOOK_URL is empty, skipping notification"
            exit 0
          fi

          if [ -n "$MESSAGE" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"${MESSAGE}\"}" \
              "$WEBHOOK_URL"
          fi
