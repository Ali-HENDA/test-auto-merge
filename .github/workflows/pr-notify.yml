name: Notify Chat on PR Events

on:
  workflow_call:
    secrets:
      CHAT_WEBHOOK_URL:
        required: true
  pull_request:
    types: [opened, review_requested, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'aa-delivery' }}
    steps:
      - name: Send message to Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.CHAT_WEBHOOK_URL }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          PR_ACTION="${{ github.event.action }}"
          ACTOR="${{ github.actor }}"
          MESSAGE=""

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            if [ "${{ github.event.issue.pull_request }}" = "" ]; then
              echo "Not a PR comment, skipping"
              exit 0
            fi
            PR_TITLE="${{ github.event.issue.title }}"
            PR_URL="${{ github.event.issue.html_url }}"
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
          fi

          PR_LINK="[${PR_TITLE}](${PR_URL})"

          case "$EVENT_NAME" in
            pull_request)
              if [ "$PR_ACTION" = "opened" ] || [ "$PR_ACTION" = "ready_for_review" ]; then
                if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
                  exit 0
                fi
                MESSAGE="Nouvelle PR ouverte par ${ACTOR} : ${PR_LINK}"
              elif [ "$PR_ACTION" = "review_requested" ]; then
                MESSAGE="🔄 ${ACTOR} demande une nouvelle review à : ${PR_LINK}"
              fi
              ;;

            pull_request_review)
              REVIEW_STATE="${{ github.event.review.state }}"
              REVIEWER="${{ github.event.review.user.login }}"

              case "$REVIEW_STATE" in
                approved)
                  MESSAGE="✅ ${REVIEWER} a approuvé la PR : ${PR_LINK}"
                  ;;
                changes_requested)
                  MESSAGE="⚠️ ${REVIEWER} a demandé des changements sur : ${PR_LINK}"
                  ;;
                *)
                  MESSAGE="💬 ${REVIEWER} a commenté la PR : ${PR_LINK}"
                  ;;
              esac
              ;;

            issue_comment)
              PR_AUTHOR="${{ github.event.issue.user.login }}"

              if [ "$ACTOR" = "$PR_AUTHOR" ]; then
                MESSAGE="💬 ${ACTOR} a commenté sa propre PR : ${PR_LINK}"
              else
                MESSAGE="💬 ${ACTOR} a commenté la PR de ${PR_AUTHOR} : ${PR_LINK}"
              fi
              ;;
          esac

          if [ -z "$WEBHOOK_URL" ]; then
            echo "WEBHOOK_URL is empty, skipping notification"
            exit 0
          fi

          if [ -n "$MESSAGE" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"${MESSAGE}\"}" \
              "$WEBHOOK_URL"
          fi